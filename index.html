    <script type="text/babel">
        const { useState, useEffect, useRef } = React;
        const { motion, AnimatePresence, useInView } = window.Motion;

        // --- Core UI Components ---

        const Icon = ({ name, className = "w-4 h-4" }) => {
            const iconRef = useRef(null);
            useEffect(() => {
                if (window.lucide) {
                    window.lucide.createIcons({
                        attrs: { class: className },
                        nameAttr: 'data-lucide'
                    });
                }
            }, [name, className]);
            return <i data-lucide={name} className={className}></i>;
        };

        const BlurText = ({ text, delay = 0, className = "", direction = 'bottom' }) => {
            const ref = useRef(null);
            const isInView = useInView(ref, { once: true, margin: "-10% 0px" });
            const words = text.split(" ");
            const yOffset = direction === 'bottom' ? 40 : -40;

            return (
                <div ref={ref} className={className}>
                    {words.map((word, i) => (
                        <motion.span
                            key={i}
                            initial={{ filter: 'blur(12px)', opacity: 0, y: yOffset }}
                            animate={isInView ? {
                                filter: 'blur(0px)',
                                opacity: 1,
                                y: 0
                            } : {}}
                            transition={{
                                duration: 0.8,
                                delay: delay + i * 0.08,
                                ease: [0.21, 0.47, 0.32, 0.98]
                            }}
                            style={{ display: 'inline-block', marginRight: '0.2em' }}
                        >
                            {word}
                        </motion.span>
                    ))}
                </div>
            );
        };

        const HlsVideo = ({ src, className = "", poster = "", desaturated = false }) => {
            const videoRef = useRef(null);
            useEffect(() => {
                const video = videoRef.current;
                if (!video) return;
                if (video.canPlayType('application/vnd.apple.mpegurl')) {
                    video.src = src;
                } else if (Hls.isSupported()) {
                    const hls = new Hls();
                    hls.loadSource(src);
                    hls.attachMedia(video);
                }
            }, [src]);
            return (
                <video
                    ref={videoRef}
                    autoPlay loop muted playsInline
                    poster={poster}
                    className={className}
                    style={desaturated ? { filter: 'saturate(0)' } : {}}
                />
            );
        };
